<div class="layout-container">
  
  <!-- Sidebar Navigation -->
  <aside class="sidebar premium-glass">
    <div class="logo-area">
      <div class="logo-icon">&lt;/&gt;</div>
      <h2>CodeRun</h2>
    </div>

    <nav class="nav-menu">
      @if (activeContestId()) {
        <p class="nav-label">Contest Workspace</p>
        <a [routerLink]="['/contests', activeContestId(), 'overview']" routerLinkActive="active" class="nav-item">
          <span class="icon">📊</span> Overview
        </a>
        <a [routerLink]="['/contests', activeContestId(), 'contesting']" routerLinkActive="active" class="nav-item">
          <span class="icon">⚔️</span> Contesting
        </a>
        <a [routerLink]="['/contests', activeContestId(), 'scoreboard']" routerLinkActive="active" class="nav-item">
          <span class="icon">🏆</span> Scoreboard
        </a>
        <hr class="nav-divider">
      }

      <p class="nav-label">Main Menu</p>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
        <span class="icon">🏠</span> Home
      </a>
      <a routerLink="/code-runner" routerLinkActive="active" class="nav-item">
        <span class="icon">💻</span> Compiler
      </a>
      <a routerLink="/problems" routerLinkActive="active" class="nav-item">
        <span class="icon">📚</span> Problems
      </a>
      <a routerLink="/contests" routerLinkActive="active" class="nav-item">
        <span class="icon">🏆</span> Contests
      </a>

      @if (isAdmin) {
        <p class="nav-label mt-4">Admin Panel</p>
        <a routerLink="/admin/problems" routerLinkActive="active" class="nav-item">
          <span class="icon">⚙️</span> Manage Problems
        </a>
        <a routerLink="/admin/contests" routerLinkActive="active" class="nav-item">
          <span class="icon">⚙️</span> Manage Contests
        </a>
      }
    </nav>
  </aside>

  <!-- Main Content Area -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <header class="top-header premium-glass">
      <div class="header-left">
        <!-- Optional search or breadcrumbs could go here -->
      </div>
      <div class="header-right">
        <button class="logout-btn" (click)="logout()">Log Out</button>
        <div class="profile-pic">
          <img src="https://ui-avatars.com/api/?name=User&background=667eea&color=fff" alt="Profile">
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
